name: Build SpaceShooter.exe

on:
  push:
    branches: [ "main", "master" ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon="game_icon.ico" --version-file="version_info.txt" --name "SpaceShooter" space_shooter.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceShooter-windows
          path: dist/SpaceShooter.exe

      - name: Attach exe to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpaceShooter.exe
